name: Nix Package Diff
on:
  pull_request:
    paths:
      - etc/**
      - home/nixos/.config/home-manager/packages/**
      - home/nixos/.config/home-manager/hosts/**
      - flake.lock
      - flake.nix
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: write # Required to post a status check to the newly pushed commit
jobs:
  diff:
    name: Generate Summary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@75b0c90b355186240b58c409b99c688ae4acf83e # main
      - uses: DeterminateSystems/magic-nix-cache-action@14645543c3b214bedad3b9b49775cb042f4c1fc7 # main
      - name: Update Lockfile (Renovate only)
        if: github.actor == 'renovate[bot]'
        run: |
          nix flake lock --update-input nixpkgs_stable

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock

          if ! git diff --cached --quiet; then
            git commit -m "chore(deps): update flake.lock for nixpkgs_stable"
            git push
          fi
      - name: Generate Summary and Auto-Heal Hashes
        id: summary
        run: |
          # 1. Try to run the package diff. If it fails, check if we can fix hash mismatches.
          if ! ./home/nixos/bin/nix-diff-summary origin/${{ github.base_ref }} > summary.md; then
            echo "::warning:: Evaluation failed. Attempting to auto-fix hashes..."

            # Run determinate-nixd to find and automatically rewrite incorrect hashes
            determinate-nixd fix hashes --auto-apply

            # Configure Git credentials
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .

            # Check if any hashes were modified
            if ! git diff --cached --quiet; then
              git commit -m "chore(deps): automatically fix Nix expression hashes"
              git push

              # Capture the newly pushed commit SHA to register a successful status check later
              NEW_SHA=$(git rev-parse HEAD)
              echo "NEW_SHA=$NEW_SHA" >> $GITHUB_ENV
            else
              echo "::error:: Build failed but no hashes were fixed. Exiting."
              exit 1
            fi

            # 2. Re-run the diff summary to verify the fixes and generate the correct markdown
            echo "[INF] Re-evaluating package changes with fixed hashes..."
            ./home/nixos/bin/nix-diff-summary origin/${{ github.base_ref }} > summary.md
          fi

          # 3. Check if there are changes
          if grep -q "No package changes found" summary.md; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      - name: Post Success Status to Fixed Commit
        if: env.NEW_SHA != ''
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ env.NEW_SHA }}" \
            -d '{"state": "success", "context": "Generate Summary", "description": "Hashes auto-fixed and verified!"}'
      - name: Comment on PR
        if: steps.summary.outputs.has_changes == 'true'
        run: |
          # Use gh CLI to comment
          PR_NUMBER=${{ github.event.pull_request.number }}
          TAG='<!-- nix_package_diff -->'

          # Check if comment already exists
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --jq ".[] | select(.body | contains(\"$TAG\")) | .id" | head -n 1)

          {
            echo "$TAG"
            cat summary.md
          } > comment_body.md

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" -X PATCH -F body=@comment_body.md
          else
            gh pr comment "$PR_NUMBER" --body-file comment_body.md
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
