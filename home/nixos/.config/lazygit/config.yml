# Avoid accidentally quitting - use ^C instead
confirmOnQuit: true
git:
  commit:
    signOff: false
  overrideGpg: true
  pagers:
    # cycle through pagers with `|`
    - colorArg: always
      pager: delta --paging=never --true-color=never
    - colorArg: always
      externalDiffCommand: diffyml
